name: BakkesMod Plugin

on:
  push:
    paths:
      - '.github/workflows/bakkesmod-plugin.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'bakkesmod/**'
      - 'crates/subtr-actor-bakkesmod/**'
      - 'src/**'
  pull_request:
    branches: [ master, main ]
    paths:
      - '.github/workflows/bakkesmod-plugin.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'bakkesmod/**'
      - 'crates/subtr-actor-bakkesmod/**'
      - 'src/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build plugin DLLs
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Validate BakkesMod helper scripts
        run: |
          python -m py_compile bakkesmod/verify-graph-dump.py bakkesmod/verify-plugin-source.py bakkesmod/verify-rust-dll-exports.py bakkesmod/verify-plugin-dll-exports.py bakkesmod/verify-rust-dll-runtime.py
          python bakkesmod/verify-plugin-source.py

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Test Rust ABI crate
        run: cargo test -p subtr-actor-bakkesmod --verbose

      - name: Build BakkesMod plugin
        shell: pwsh
        run: >
          powershell -NoProfile -ExecutionPolicy Bypass
          -File .\bakkesmod\build-windows.ps1

      - name: Verify live graph surface in plugin artifacts
        shell: pwsh
        run: |
          $pluginDll = "bakkesmod/build/Release/SubtrActorPlugin.dll"
          $rustDll = "bakkesmod/build/Release/subtr_actor_bakkesmod.dll"
          $installPluginDll = "bakkesmod/build/Release/bakkesmod-install/plugins/SubtrActorPlugin.dll"
          $installRustDll = "bakkesmod/build/Release/bakkesmod-install/data/subtr-actor/subtr_actor_bakkesmod.dll"

          foreach ($path in @($pluginDll, $rustDll, $installPluginDll, $installRustDll)) {
            if (-not (Test-Path $path)) {
              throw "Expected artifact not found: $path"
            }
          }
          if ((Get-FileHash $pluginDll).Hash -ne (Get-FileHash $installPluginDll).Hash) {
            throw "Install layout plugin DLL differs from primary plugin DLL"
          }
          if ((Get-FileHash $rustDll).Hash -ne (Get-FileHash $installRustDll).Hash) {
            throw "Install layout Rust DLL differs from primary Rust DLL"
          }
          python bakkesmod/verify-rust-dll-exports.py $rustDll $installRustDll
          python bakkesmod/verify-plugin-dll-exports.py $pluginDll $installPluginDll
          python bakkesmod/verify-rust-dll-runtime.py $rustDll $installRustDll

          function Read-ArtifactText([string]$Path) {
            $bytes = [System.IO.File]::ReadAllBytes((Resolve-Path $Path))
            return [System.Text.Encoding]::ASCII.GetString($bytes)
          }

          function Assert-Contains([string]$Text, [string]$Needle, [string]$Label) {
            if (-not $Text.Contains($Needle)) {
              throw "Missing $Label in built artifact: $Needle"
            }
          }

          $pluginText = Read-ArtifactText $pluginDll
          Assert-Contains $pluginText "subtr_actor_verify_graph" "BakkesMod graph verification command"
          Assert-Contains $pluginText "subtr_actor_self_test_graph" "BakkesMod synthetic graph self-test command"
          Assert-Contains $pluginText "graph self-test fed every required event family" "BakkesMod synthetic graph self-test diagnostics"
          Assert-Contains $pluginText "graph self-test derived active_demos from demolish event" "BakkesMod derived active-demo self-test diagnostics"
          Assert-Contains $pluginText "graph self-test writing synthetic graph dump" "BakkesMod synthetic graph dump diagnostics"
          Assert-Contains $pluginText "require_event_history" "BakkesMod strict event-history verification mode"
          Assert-Contains $pluginText "require_graph_events" "BakkesMod strict graph-events verification mode"
          Assert-Contains $pluginText "every callable analysis node" "BakkesMod graph verification scope"
          Assert-Contains $pluginText "Function TAGame.Ball_TA.OnCarTouch" "BakkesMod ball touch event hook"
          Assert-Contains $pluginText "Function TAGame.VehiclePickup_TA.EventPickedUp" "BakkesMod boost pickup event hook"
          Assert-Contains $pluginText "Function TAGame.VehiclePickup_TA.EventSpawned" "BakkesMod boost spawn event hook"
          Assert-Contains $pluginText "Function TAGame.GameEvent_Soccar_TA.EventGoalScored" "BakkesMod goal scored event hook"
          Assert-Contains $pluginText "Function TAGame.Car_TA.Demolish" "BakkesMod demolition event hook"
          Assert-Contains $pluginText "verified {} graph outputs by name" "BakkesMod graph output registry verification"
          Assert-Contains $pluginText "graph_info declares all {} required graph outputs" "BakkesMod required graph output registry verification"
          Assert-Contains $pluginText "graph_info missing required graph output" "BakkesMod required graph output registry diagnostics"
          Assert-Contains $pluginText "graph_info declares {} graph event fields and {} required graph event fields" "BakkesMod Rust-declared graph event registry verification"
          Assert-Contains $pluginText "graph_info declares all {} known graph event fields" "BakkesMod required graph event registry verification"
          Assert-Contains $pluginText "graph_info missing required graph event field" "BakkesMod required graph event registry diagnostics"
          Assert-Contains $pluginText "graph_info declares all {} strict graph event fields" "BakkesMod strict graph event registry verification"
          Assert-Contains $pluginText "graph_info missing strict graph event field" "BakkesMod strict graph event registry diagnostics"
          Assert-Contains $pluginText "could not read graph event field names from graph_info" "BakkesMod graph event registry diagnostics"
          Assert-Contains $pluginText "could not read required graph event field names from graph_info" "BakkesMod required graph event registry diagnostics"
          Assert-Contains $pluginText "required graph event field '{}' is not declared" "BakkesMod required graph event declaration diagnostics"
          Assert-Contains $pluginText "graph_info declares {} event_history fields and {} required cumulative event fields" "BakkesMod Rust-declared event history registry verification"
          Assert-Contains $pluginText "graph_info declares all {} known event_history fields" "BakkesMod required event history registry verification"
          Assert-Contains $pluginText "graph_info missing required event_history field" "BakkesMod required event history registry diagnostics"
          Assert-Contains $pluginText "graph_info declares all {} strict cumulative event_history fields" "BakkesMod strict event history registry verification"
          Assert-Contains $pluginText "graph_info missing strict cumulative event_history field" "BakkesMod strict event history registry diagnostics"
          Assert-Contains $pluginText "could not read event_history field names from graph_info" "BakkesMod event history registry diagnostics"
          Assert-Contains $pluginText "could not read required event_history field names from graph_info" "BakkesMod required event history registry diagnostics"
          Assert-Contains $pluginText "required event_history field '{}' is not declared" "BakkesMod required event history declaration diagnostics"
          Assert-Contains $pluginText "matches fixed ABI" "BakkesMod named/fixed graph output verification"
          Assert-Contains $pluginText "differs from named output" "BakkesMod named/fixed graph output mismatch diagnostics"
          Assert-Contains $pluginText "verified {} builtin stats modules by name" "BakkesMod stats module registry verification"
          Assert-Contains $pluginText "callable analysis node registry matches graph_info" "BakkesMod callable node registry consistency"
          Assert-Contains $pluginText "resolved analysis graph nodes are callable by name" "BakkesMod resolved graph node callability verification"
          Assert-Contains $pluginText "analysis_nodes output contains {} callable analysis nodes exactly" "BakkesMod exact bulk analysis node verification"
          Assert-Contains $pluginText "analysis_nodes output has unexpected node" "BakkesMod unexpected analysis node verification"
          Assert-Contains $pluginText "frame_events_state exposes {} live event fields" "BakkesMod frame event surface verification"
          Assert-Contains $pluginText "frame_events_state missing event field" "BakkesMod frame event missing-field diagnostics"
          Assert-Contains $pluginText "frame_events_state event field '{}' has {} entries" "BakkesMod frame event count diagnostics"
          Assert-Contains $pluginText "frame_events_state event field '{}' is not an array" "BakkesMod frame event array diagnostics"
          Assert-Contains $pluginText "events output field '{}' has {} entries" "BakkesMod graph event count diagnostics"
          Assert-Contains $pluginText "events output field '{}' is not an array" "BakkesMod graph event array diagnostics"
          Assert-Contains $pluginText "events output exposes {} graph event fields" "BakkesMod graph event surface verification"
          Assert-Contains $pluginText "events required graph event field '{}' has no entries" "BakkesMod strict graph event diagnostics"
          Assert-Contains $pluginText "events required graph event fields are nonzero" "BakkesMod strict graph event success diagnostics"
          Assert-Contains $pluginText "event_history event field '{}' has {} cumulative entries" "BakkesMod cumulative event count diagnostics"
          Assert-Contains $pluginText "event_history event field '{}' is not an array" "BakkesMod cumulative event array diagnostics"
          Assert-Contains $pluginText "event_history exposes {} cumulative live event fields" "BakkesMod cumulative event surface verification"
          Assert-Contains $pluginText "required event field '{}' has no cumulative entries" "BakkesMod strict cumulative event diagnostics"
          Assert-Contains $pluginText "required cumulative event fields are nonzero" "BakkesMod strict cumulative event success diagnostics"
          Assert-Contains $pluginText "touch_events" "BakkesMod touch event-family field verification"
          Assert-Contains $pluginText "dodge_refreshed_events" "BakkesMod dodge-refresh event-family field verification"
          Assert-Contains $pluginText "boost_pad_events" "BakkesMod boost-pad event-family field verification"
          Assert-Contains $pluginText "player_stat_events" "BakkesMod player-stat event-family field verification"
          Assert-Contains $pluginText "goal_events" "BakkesMod goal event-family field verification"
          Assert-Contains $pluginText "demo_events" "BakkesMod demolition event-family field verification"
          Assert-Contains $pluginText "active_demos" "BakkesMod active demolition field verification"
          Assert-Contains $pluginText "live frame processing failed" "BakkesMod live frame processing diagnostics"
          Assert-Contains $pluginText "live graph finalization failed during" "BakkesMod finalization diagnostics"
          Assert-Contains $pluginText "plugin unload" "BakkesMod unload finalization context"
          Assert-Contains $pluginText "subtr_actor_dump_graph_output <events|frame|timeline|stats|analysis_nodes|event_history|graph_info> [finish]" "graph output command usage"
          Assert-Contains $pluginText "graph-analysis-nodes.json" "bulk analysis-node dump filename"
          Assert-Contains $pluginText "graph-event-history.json" "live event-history dump filename"
          Assert-Contains $pluginText "analysis_nodes" "analysis_nodes graph output name"
          Assert-Contains $pluginText "event_history" "event_history graph output name"
          Assert-Contains $pluginText "subtr_actor_bakkesmod_analysis_node_names_json_len" "analysis node names registry loader"

          $rustText = Read-ArtifactText $rustDll
          Assert-Contains $rustText "subtr_actor_bakkesmod_graph_output_json_len" "graph output length export"
          Assert-Contains $rustText "subtr_actor_bakkesmod_write_graph_output_json" "graph output write export"
          Assert-Contains $rustText "subtr_actor_bakkesmod_analysis_node_json_len" "analysis node length export"
          Assert-Contains $rustText "subtr_actor_bakkesmod_write_analysis_node_json" "analysis node write export"
          Assert-Contains $rustText "subtr_actor_bakkesmod_analysis_node_names_json_len" "analysis node names length export"
          Assert-Contains $rustText "subtr_actor_bakkesmod_write_analysis_node_names_json" "analysis node names write export"
          Assert-Contains $rustText "callable_analysis_node_names" "callable analysis-node registry"
          Assert-Contains $rustText "builtin_analysis_node_names" "builtin analysis-node registry"
          Assert-Contains $rustText "analysis_nodes" "analysis_nodes graph output"
          Assert-Contains $rustText "event_history" "event_history graph output"
          Assert-Contains $rustText "graph_event_field_names" "graph event graph info field registry"
          Assert-Contains $rustText "required_graph_event_field_names" "graph event graph info required field registry"
          Assert-Contains $rustText "event_history_field_names" "event_history graph info field registry"
          Assert-Contains $rustText "required_event_history_field_names" "event_history graph info required field registry"
          Assert-Contains $rustText "stats_timeline_events" "stats timeline analysis node"

      - name: Upload plugin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: subtr-actor-bakkesmod-plugin
          if-no-files-found: error
          path: |
            bakkesmod/build/Release/SubtrActorPlugin.dll
            bakkesmod/build/Release/subtr_actor_bakkesmod.dll
            bakkesmod/build/Release/bakkesmod-install/**
