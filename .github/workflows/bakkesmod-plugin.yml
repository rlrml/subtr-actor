name: BakkesMod Plugin

on:
  push:
    paths:
      - '.github/workflows/bakkesmod-plugin.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'bakkesmod/**'
      - 'crates/subtr-actor-training/**'
      - 'src/**'
  pull_request:
    branches: [ master, main ]
    paths:
      - '.github/workflows/bakkesmod-plugin.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'bakkesmod/**'
      - 'crates/subtr-actor-training/**'
      - 'src/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Rust 1.97 miscompiles this crate's glob re-exports (rust-lang/rust#159038).
  RUST_TOOLCHAIN: "1.96.1"

jobs:
  build:
    name: Build plugin DLLs
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Validate BakkesMod helper scripts
        run: |
          python -m py_compile bakkesmod/subtr-actor/verify-graph-dump.py bakkesmod/subtr-actor/verify-plugin-source.py bakkesmod/subtr-actor/verify-rust-dll-exports.py bakkesmod/subtr-actor/verify-plugin-dll-exports.py bakkesmod/subtr-actor/verify-rust-dll-runtime.py bakkesmod/replay-to-training/verify-dll-exports.py
          python bakkesmod/subtr-actor/verify-plugin-source.py

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Test Rust ABI crate
        run: cargo test -p subtr-actor-bakkesmod --verbose

      - name: Test replay-to-training Rust ABI crate
        run: cargo test -p subtr-actor-replay-to-training --verbose

      - name: Build BakkesMod plugin
        shell: pwsh
        run: .\bakkesmod\subtr-actor\build-windows.ps1

      - name: Verify live graph surface in plugin artifacts
        shell: pwsh
        run: .\bakkesmod\subtr-actor\verify-plugin-artifacts.ps1

      - name: Build replay-to-training plugin
        shell: pwsh
        run: .\bakkesmod\replay-to-training\build-windows.ps1

      - name: Verify replay-to-training DLL exports
        run: python bakkesmod/replay-to-training/verify-dll-exports.py --rust-dll bakkesmod/replay-to-training/build/Release/replay_to_training.dll --plugin-dll bakkesmod/replay-to-training/build/Release/ReplayToTrainingPlugin.dll

      - name: Upload plugin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: subtr-actor-bakkesmod-plugin
          if-no-files-found: error
          path: |
            bakkesmod/subtr-actor/build/Release/SubtrActorPlugin.dll
            bakkesmod/subtr-actor/build/Release/subtr_actor_bakkesmod.dll
            bakkesmod/subtr-actor/build/Release/bakkesmod-install/**

      - name: Upload replay-to-training plugin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: subtr-actor-replay-to-training-plugin
          if-no-files-found: error
          path: |
            bakkesmod/replay-to-training/build/Release/ReplayToTrainingPlugin.dll
            bakkesmod/replay-to-training/build/Release/replay_to_training.dll
            bakkesmod/replay-to-training/build/Release/bakkesmod-install/**
