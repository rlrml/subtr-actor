name: Release GitHub

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (without v prefix)'
        required: true

jobs:
  publish:
    name: Create GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "+${GITHUB_REF}:refs/github/checkout"
          git checkout --detach refs/github/checkout

      - name: Determine release version
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag_name="${GITHUB_REF_NAME}"
          else
            tag_name="v${{ github.event.inputs.version }}"
          fi

          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "version=${tag_name#v}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from changelog
        run: |
          python3 scripts/extract_release_notes.py "${{ steps.release.outputs.version }}" > release-notes.md

      - name: Check GitHub token
        id: github_token
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if output="$(gh api rate_limit 2>&1)"; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if grep -qi "account was suspended" <<<"$output"; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GitHub rejected the default Actions token as suspended. Skipping GitHub release creation in CI."
            exit 0
          fi

          echo "$output"
          exit 1

      - name: Create or update GitHub release
        if: steps.github_token.outputs.available == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --title "${TAG_NAME}" \
              --notes-file release-notes.md
            echo "Updated GitHub release ${TAG_NAME}."
          else
            gh release create "${TAG_NAME}" \
              --verify-tag \
              --title "${TAG_NAME}" \
              --notes-file release-notes.md
            echo "Created GitHub release ${TAG_NAME}."
          fi

      - name: Summary
        run: |
          {
            if [[ "${{ steps.github_token.outputs.available }}" == "true" ]]; then
              echo "### GitHub Release Published"
              echo "Created or updated the release page for ${{ steps.release.outputs.tag_name }}."
            else
              echo "### GitHub Release Skipped"
              echo "GitHub rejected the default Actions token as suspended, so CI skipped release page creation."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
