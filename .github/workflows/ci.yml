name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        targets: wasm32-unknown-unknown

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install wasm-pack
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

    - name: Check release metadata consistency
      run: python3 scripts/check_release_versions.py

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Check lockfile
      run: cargo metadata --locked --format-version 1 > /dev/null

    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Run tests
      run: cargo test --verbose

    - name: Install player dependencies
      working-directory: js/player
      run: npm ci

    - name: Build player package
      working-directory: js/player
      run: npm run build

    - name: Install stats player dependencies
      working-directory: js/stat-evaluation-player
      run: npm ci

    - name: Test stats player package
      working-directory: js/stat-evaluation-player
      run: npm test

    - name: Build stats player package
      working-directory: js/stat-evaluation-player
      run: npm run build

    - name: Build release
      run: cargo build --release --verbose
