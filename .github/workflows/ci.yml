name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  schedule:
    - cron: '23 10 * * *'
  workflow_dispatch:
    inputs:
      full_replay_tests:
        description: Run exhaustive replay fixture tests
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_MULTIPLEXING: "false"
  RUST_TOOLCHAIN: "1.96.1"
  RUN_FULL_REPLAY_TESTS: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.full_replay_tests) }}

jobs:
  rust-quality:
    name: Rust quality
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repository
      shell: bash
      run: |
        set -euo pipefail
        git init .
        git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
        git fetch --depth=1 origin "+${GITHUB_REF}:refs/github/checkout"
        git checkout --detach refs/github/checkout

    - name: Install Rust
      shell: bash
      run: |
        rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component rustfmt --component clippy --no-self-update
        rustup default "$RUST_TOOLCHAIN"

    - name: Check release metadata consistency
      run: python3 scripts/check_release_versions.py

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Check lockfile
      run: cargo metadata --locked --format-version 1 > /dev/null

    - name: Run clippy
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings

    - name: Install cargo-rdme
      run: bash .github/scripts/install-cargo-rdme.sh

    - name: Check README is in sync with crate docs
      run: cargo rdme --check --heading-base-level 0

  rust-tests:
    name: Rust tests
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repository
      shell: bash
      run: |
        set -euo pipefail
        git init .
        git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
        git fetch --depth=1 origin "+${GITHUB_REF}:refs/github/checkout"
        git checkout --detach refs/github/checkout

    - name: Install Rust
      shell: bash
      run: |
        rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --no-self-update
        rustup default "$RUST_TOOLCHAIN"

    - name: Run Rust tests
      run: |
        cargo test --verbose -- \
          --skip post_eac_replays_emit_stats_outputs \
          --skip stats_collector_default_resolution_matches_every_frame \
          --skip stats_collector_and_timeline_collector_match_at_sampled_resolution \
          --skip test_stats_timeline_value_serializes_for_rlcs_replay

  rust-replay-fixtures:
    name: Rust replay fixtures
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.full_replay_tests) }}

    steps:
    - name: Checkout repository
      shell: bash
      run: |
        set -euo pipefail
        git init .
        git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
        git fetch --depth=1 origin "+${GITHUB_REF}:refs/github/checkout"
        git checkout --detach refs/github/checkout

    - name: Install Rust
      shell: bash
      run: |
        rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --no-self-update
        rustup default "$RUST_TOOLCHAIN"

    - name: Run exhaustive Rust replay tests
      run: |
        cargo test --verbose --test post_eac_replay_fixture_test post_eac_replays_emit_stats_outputs
        cargo test --verbose --test stats_frame_resolution_test stats_collector_default_resolution_matches_every_frame
        cargo test --verbose --test stats_frame_resolution_test stats_collector_and_timeline_collector_match_at_sampled_resolution
        cargo test --verbose --test stats_timeline_collector_test test_stats_timeline_value_serializes_for_rlcs_replay

  rust-release-build:
    name: Rust release build
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repository
      shell: bash
      run: |
        set -euo pipefail
        git init .
        git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
        git fetch --depth=1 origin "+${GITHUB_REF}:refs/github/checkout"
        git checkout --detach refs/github/checkout

    - name: Install Rust
      shell: bash
      run: |
        rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --no-self-update
        rustup default "$RUST_TOOLCHAIN"

    - name: Build release
      shell: bash
      run: |
        set -euo pipefail
        for attempt in 1 2 3; do
          if cargo build --release --verbose; then
            exit 0
          fi
          if [[ "$attempt" == "3" ]]; then
            exit 1
          fi
          sleep $((attempt * 10))
        done

  player-package:
    name: Player package
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repository
      shell: bash
      run: |
        set -euo pipefail
        git init .
        git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
        git fetch --depth=1 origin "+${GITHUB_REF}:refs/github/checkout"
        git checkout --detach refs/github/checkout

    - name: Install Rust
      shell: bash
      run: |
        rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --target wasm32-unknown-unknown --no-self-update
        rustup default "$RUST_TOOLCHAIN"

    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: js/player/package-lock.json

    - name: Install wasm-pack
      run: bash .github/scripts/install-wasm-pack.sh

    - name: Install JS tooling dependencies
      working-directory: js
      run: npm ci --ignore-scripts

    - name: Check JS/TS style
      working-directory: js
      run: npm run check:style

    - name: Install player dependencies
      working-directory: js/player
      run: npm ci

    - name: Typecheck player package
      working-directory: js/player
      run: npm run check

    - name: Build player package
      working-directory: js/player
      run: npm run build

  stats-player-package:
    name: Stats player package
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repository
      shell: bash
      run: |
        set -euo pipefail
        git init .
        git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
        git fetch --depth=1 origin "+${GITHUB_REF}:refs/github/checkout"
        git checkout --detach refs/github/checkout

    - name: Install Rust
      shell: bash
      run: |
        rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --target wasm32-unknown-unknown --no-self-update
        rustup default "$RUST_TOOLCHAIN"

    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: |
          js/player/package-lock.json
          js/stat-evaluation-player/package-lock.json

    - name: Install wasm-pack
      run: bash .github/scripts/install-wasm-pack.sh

    - name: Install player dependencies
      working-directory: js/player
      run: npm ci

    - name: Install stats player dependencies
      working-directory: js/stat-evaluation-player
      run: npm ci

    - name: Typecheck stats player package
      working-directory: js/stat-evaluation-player
      run: npm run check

    - name: Test stats player package
      working-directory: js/stat-evaluation-player
      run: npm run test:ci

    - name: Build stats player package
      working-directory: js/stat-evaluation-player
      run: npm run build

  stats-player-replay-fixtures:
    name: Stats player replay fixtures
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.full_replay_tests) }}

    steps:
    - name: Checkout repository
      shell: bash
      run: |
        set -euo pipefail
        git init .
        git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
        git fetch --depth=1 origin "+${GITHUB_REF}:refs/github/checkout"
        git checkout --detach refs/github/checkout

    - name: Install Rust
      shell: bash
      run: |
        rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --target wasm32-unknown-unknown --no-self-update
        rustup default "$RUST_TOOLCHAIN"

    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: |
          js/player/package-lock.json
          js/stat-evaluation-player/package-lock.json

    - name: Install wasm-pack
      run: bash .github/scripts/install-wasm-pack.sh

    - name: Install player dependencies
      working-directory: js/player
      run: npm ci

    - name: Install stats player dependencies
      working-directory: js/stat-evaluation-player
      run: npm ci

    - name: Run exhaustive stats player replay fixture tests
      working-directory: js/stat-evaluation-player
      run: npm run test:fixtures
