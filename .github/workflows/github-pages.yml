name: GitHub Pages

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "+${GITHUB_REF}:refs/github/checkout"
          git checkout --detach refs/github/checkout

      - name: Install Nix
        shell: bash
        run: |
          set -euo pipefail

          curl --fail --silent --show-error --location https://nixos.org/nix/install \
            | sh -s -- --daemon --yes
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh

          mkdir -p ~/.config/nix
          echo "experimental-features = nix-command flakes" >> ~/.config/nix/nix.conf

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Build stats player site
        shell: bash
        run: |
          set -euo pipefail
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh

          for attempt in 1 2 3; do
            echo "nix build attempt ${attempt}/3"
            rm -rf result
            if nix build .#js-stats-player-pages --out-link result --print-build-logs --fallback; then
              test -d result
              exit 0
            fi

            status=$?
            if [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi

            # Flake input archive fetches occasionally return transient 504s on GitHub.
            sleep $((attempt * 60))
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./result

  deploy:
    name: Deploy Pages
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
