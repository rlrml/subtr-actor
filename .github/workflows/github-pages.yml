name: GitHub Pages

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "+${GITHUB_REF}:refs/github/checkout"
          git checkout --detach refs/github/checkout

      - name: Install Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal --target wasm32-unknown-unknown --no-self-update
          rustup default stable

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            js/player/package-lock.json
            js/stat-evaluation-player/package-lock.json
            js/pages/package-lock.json

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Install player dependencies
        working-directory: js/player
        run: npm ci

      - name: Install stats player dependencies
        working-directory: js/stat-evaluation-player
        run: npm ci

      - name: Install stats pages dependencies
        working-directory: js/pages
        run: npm ci

      - name: Build stats player site
        shell: bash
        run: |
          set -euo pipefail
          pushd js/stat-evaluation-player
          npm run build:site
          popd

          pushd js/pages
          npm run build
          popd

          mkdir -p result
          cp -r js/stat-evaluation-player/dist/. result/
          mkdir -p result/stats
          cp -r js/pages/dist/. result/stats/
          mkdir -p result/review
          cp -r js/stat-evaluation-player/dist/. result/review/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./result

  deploy:
    name: Deploy Pages
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
