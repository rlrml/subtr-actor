name: Auto Release on Merge

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  check-and-release:
    name: Check for version bump and release
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    # Only run on actual merges, not direct pushes of workflow files
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip-release]')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep -m1 'version = "' Cargo.toml | sed 's/.*version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.get_version.outputs.version }} already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.get_version.outputs.version }} does not exist"
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.get_version.outputs.version }}" -m "Release v${{ steps.get_version.outputs.version }}"
          git push origin "v${{ steps.get_version.outputs.version }}"
          echo "Created and pushed tag v${{ steps.get_version.outputs.version }}"

      - name: Dispatch release workflows
        if: steps.check_tag.outputs.exists == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: v${{ steps.get_version.outputs.version }}
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          set -euo pipefail

          api_url="${{ github.api_url }}/repos/${{ github.repository }}/actions/workflows"

          dispatch() {
            local workflow="$1"
            local payload="$2"

            curl --fail --silent --show-error \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${api_url}/${workflow}/dispatches" \
              -d "${payload}"
          }

          dispatch "release-rust.yml" "{\"ref\":\"${TAG_NAME}\",\"inputs\":{\"version\":\"${VERSION}\"}}"
          dispatch "release-python.yml" "{\"ref\":\"${TAG_NAME}\",\"inputs\":{\"version\":\"${VERSION}\"}}"
          dispatch "release-js.yml" "{\"ref\":\"${TAG_NAME}\"}"

          echo "Dispatched release workflows for ${TAG_NAME}"

      - name: Summary
        run: |
          if [ "${{ steps.check_tag.outputs.exists }}" == "true" ]; then
            {
              echo "### No Release Needed"
              echo "Tag v${{ steps.get_version.outputs.version }} already exists."
              echo "To trigger a new release, bump the version in Cargo.toml."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### Release Triggered"
              echo "Created tag v${{ steps.get_version.outputs.version }}"
              echo "Dispatched the JS, Python, and Rust release workflows for that tag."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
