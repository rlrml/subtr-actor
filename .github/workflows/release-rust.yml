name: Release Rust

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (without v prefix)'
        required: true

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check release metadata consistency
        run: python3 scripts/check_release_versions.py

      - name: Check lockfile
        run: cargo metadata --locked --format-version 1 > /dev/null

      - name: Preflight crates.io publish
        id: preflight
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "Missing CARGO_REGISTRY_TOKEN secret. Add it in repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi

          crate_version="$(grep -E '^version = "[0-9]+\.[0-9]+\.[0-9]+"' Cargo.toml | head -n1 | sed -E 's/version = "([^"]+)"/\1/')"
          if [[ -z "$crate_version" ]]; then
            echo "Failed to determine crate version from Cargo.toml."
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [[ "$tag_version" != "$crate_version" ]]; then
              echo "Tag version ($tag_version) does not match Cargo.toml version ($crate_version)."
              exit 1
            fi
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            requested="${{ github.event.inputs.version }}"
            if [[ "$requested" != "$crate_version" ]]; then
              echo "workflow_dispatch version input ($requested) does not match Cargo.toml version ($crate_version)."
              exit 1
            fi
          fi

          status_code="$(curl --silent --output /dev/null --write-out '%{http_code}' "https://crates.io/api/v1/crates/subtr-actor/${crate_version}")"
          if [[ "$status_code" == "200" ]]; then
            echo "subtr-actor $crate_version is already published on crates.io. Skipping publish."
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to crates.io
        if: steps.preflight.outputs.already_published != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p subtr-actor --locked
