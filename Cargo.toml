[workspace]
members = [".", "js", "python"]
resolver = "2"

[workspace.package]
version = "0.1.17"
authors = ["Ivan Malison <ivanmalison@gmail.com>"]
license = "MIT"
repository = "https://github.com/rlrml/subtr-actor"
edition = "2021"

[workspace.dependencies]
boxcars = { git = "https://github.com/nickbabcock/boxcars.git", rev = "f9fbee88e53fa3fe515c157c9f5cf10e1bd9e1a3" }

[package]
name = "subtr-actor"
version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
edition.workspace = true
keywords = ["rocket-league"]
categories = ["parsing"]
description = "Rocket League replay transformer"

[dependencies]
anyhow = "1.0.98"
boxcars.workspace = true
derive-new = "0.7.0"
float-ord = "0.3.2"
glam = "0.31.0"
log = "0.4.27"
ndarray = "0.17.2"
paste = "1.0.15"
reqwest = { version = "0.12.15", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1.0.140"
thiserror = "2.0.12"

[badges.github]
repository = "rlrml/subtr-actor"

[badges.maintenance]
status = "actively-developed"
