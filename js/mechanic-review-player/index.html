<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mechanic Review Player</title>
  </head>
  <body>
    <div id="app">
      <main class="review-shell">
        <section class="stage">
          <div id="viewport" class="viewport"></div>
          <div id="status" class="status-line">Load a playlist to begin.</div>
        </section>
        <aside class="review-panel">
          <header class="panel-header">
            <h1>Mechanic Review</h1>
            <div id="playlist-summary" class="summary">No playlist</div>
          </header>

          <div class="loader-row">
            <label class="file-button">
              <input id="playlist-file" type="file" accept="application/json,.json" />
              Playlist JSON
            </label>
            <input id="playlist-url" class="url-input" type="url" placeholder="Playlist URL" />
            <button id="load-url" type="button">Load</button>
          </div>

          <section class="candidate">
            <div class="candidate-kicker" id="candidate-index">0 / 0</div>
            <h2 id="candidate-title">No candidate selected</h2>
            <dl class="candidate-fields">
              <div>
                <dt>Mechanic</dt>
                <dd id="candidate-mechanic">-</dd>
              </div>
              <div>
                <dt>Player</dt>
                <dd id="candidate-player">-</dd>
              </div>
              <div>
                <dt>Confidence</dt>
                <dd id="candidate-confidence">-</dd>
              </div>
              <div>
                <dt>Replay</dt>
                <dd id="candidate-replay">-</dd>
              </div>
              <div class="wide-field">
                <dt>Reason</dt>
                <dd id="candidate-reason">-</dd>
              </div>
            </dl>
          </section>

          <div class="timeline-row">
            <input id="scrubber" type="range" min="0" max="1000" value="0" />
            <div id="time-readout" class="time-readout">0.0 / 0.0s</div>
          </div>

          <div class="controls">
            <button id="previous" type="button" title="Previous candidate">Prev</button>
            <button id="play" type="button" title="Play or pause">Play</button>
            <button id="next" type="button" title="Next candidate">Next</button>
          </div>

          <div class="settings-grid">
            <label>
              Advance
              <select id="advance-mode">
                <option value="manual">Manual</option>
                <option value="auto">Auto</option>
              </select>
            </label>
            <label>
              End
              <select id="end-mode">
                <option value="stop">Stop</option>
                <option value="loop">Loop</option>
              </select>
            </label>
            <label>
              Speed
              <select id="speed">
                <option value="0.25">0.25x</option>
                <option value="0.5">0.5x</option>
                <option value="1" selected>1x</option>
                <option value="1.5">1.5x</option>
                <option value="2">2x</option>
              </select>
            </label>
            <label class="checkbox-row">
              <input id="follow-player" type="checkbox" checked />
              Follow candidate
            </label>
          </div>

          <section class="playlist-panel">
            <div class="section-heading">
              <h2>Playlist</h2>
              <span id="playlist-count">0 items</span>
            </div>
            <div id="playlist-items" class="playlist-items"></div>
          </section>

          <section class="event-panel">
            <h2>Event</h2>
            <pre id="event-json">{}</pre>
          </section>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
